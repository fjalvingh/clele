# Reference Apache reverse-proxy config for serving Clele at https://qd.ax/
#
# Requires: a2enmod proxy proxy_http headers   (then: systemctl reload apache2)
# TLS is terminated by Apache; the backend listens on plain HTTP at 127.0.0.1:8080.
#
# Place these directives INSIDE the existing qd.ax :443 TLS <VirtualHost>:

ProxyPreserveHost On
# Tell the backend the original request was HTTPS so it marks the session cookie Secure
# and builds correct absolute URLs (server.forward-headers-strategy=framework reads this).
RequestHeader set X-Forwarded-Proto "https"

# The app is served at the root: browser /  ->  backend 127.0.0.1:8080/
ProxyPass        /  http://127.0.0.1:8080/
ProxyPassReverse /  http://127.0.0.1:8080/
