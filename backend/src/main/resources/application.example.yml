spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    url: jdbc:postgresql://localhost:5432/partsdb
    username: partsuser
    password: partspass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

anthropic:
  api-key: ""
  model: claude-haiku-4-5-20251001

# Local AI (Ollama) used for offline part auto-categorization
ollama:
  base-url: http://localhost:11434
  model: qwen2.5:7b-instruct

# OctoPart (Nexar) part enrichment. Credentials are per-user (set on the profile page); this is
# only the per-user monthly request cap matching the free Nexar contract.
octopart:
  monthly-limit: 100
