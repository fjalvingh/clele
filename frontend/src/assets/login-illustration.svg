<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1200" width="900" height="1200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#0b3b37"/>
    </linearGradient>
    <linearGradient id="bench" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#134e4a"/>
      <stop offset="100%" stop-color="#0f3d3a"/>
    </linearGradient>
  </defs>

  <rect width="900" height="1200" fill="url(#bg)"/>

  <!-- faint circuit trace pattern -->
  <g stroke="#2dd4bf" stroke-opacity="0.12" stroke-width="3" fill="none">
    <path d="M0 140 H180 V260 H420 V180 H900"/>
    <path d="M0 420 H120 V520 H320 V460 H620 V560 H900"/>
    <path d="M0 760 H240 V680 H480 V820 H700 V740 H900"/>
    <path d="M0 980 H160 V1060 H500 V980 H900"/>
    <circle cx="180" cy="140" r="6" fill="#2dd4bf" fill-opacity="0.25"/>
    <circle cx="420" cy="260" r="6" fill="#2dd4bf" fill-opacity="0.25"/>
    <circle cx="320" cy="520" r="6" fill="#2dd4bf" fill-opacity="0.25"/>
    <circle cx="620" cy="460" r="6" fill="#2dd4bf" fill-opacity="0.25"/>
    <circle cx="480" cy="680" r="6" fill="#2dd4bf" fill-opacity="0.25"/>
    <circle cx="700" cy="820" r="6" fill="#2dd4bf" fill-opacity="0.25"/>
  </g>

  <!-- floating resistors / caps -->
  <g>
    <g transform="translate(120,180) rotate(-18)">
      <rect x="-26" y="-8" width="52" height="16" rx="8" fill="#f0fdfa" fill-opacity="0.85"/>
      <rect x="-14" y="-8" width="4" height="16" fill="#134e4a"/>
      <rect x="-4" y="-8" width="4" height="16" fill="#5eead4"/>
      <rect x="6" y="-8" width="4" height="16" fill="#f472b6" fill-opacity="0.6"/>
      <line x1="-26" y1="0" x2="-42" y2="0" stroke="#f0fdfa" stroke-opacity="0.6" stroke-width="3"/>
      <line x1="26" y1="0" x2="42" y2="0" stroke="#f0fdfa" stroke-opacity="0.6" stroke-width="3"/>
    </g>
    <g transform="translate(760,300) rotate(12)">
      <rect x="-26" y="-8" width="52" height="16" rx="8" fill="#f0fdfa" fill-opacity="0.7"/>
      <rect x="-14" y="-8" width="4" height="16" fill="#134e4a"/>
      <rect x="-4" y="-8" width="4" height="16" fill="#2dd4bf"/>
      <line x1="-26" y1="0" x2="-42" y2="0" stroke="#f0fdfa" stroke-opacity="0.5" stroke-width="3"/>
      <line x1="26" y1="0" x2="42" y2="0" stroke="#f0fdfa" stroke-opacity="0.5" stroke-width="3"/>
    </g>
    <g transform="translate(670,140)">
      <rect x="-10" y="-16" width="20" height="32" rx="3" fill="#5eead4" fill-opacity="0.55"/>
      <line x1="-5" y1="16" x2="-5" y2="30" stroke="#f0fdfa" stroke-opacity="0.5" stroke-width="3"/>
      <line x1="5" y1="16" x2="5" y2="30" stroke="#f0fdfa" stroke-opacity="0.5" stroke-width="3"/>
    </g>
    <circle cx="200" cy="330" r="10" fill="#f0fdfa" fill-opacity="0.25"/>
    <circle cx="800" cy="230" r="6" fill="#f0fdfa" fill-opacity="0.3"/>
  </g>

  <!-- bench -->
  <rect x="0" y="880" width="900" height="320" fill="url(#bench)"/>
  <rect x="0" y="880" width="900" height="14" fill="#0a2e2b"/>

  <!-- PCB on bench -->
  <g transform="translate(430,830)">
    <rect x="-140" y="-10" width="280" height="90" rx="10" fill="#115e59" stroke="#5eead4" stroke-width="3"/>
    <g stroke="#99f6e4" stroke-width="2.5" fill="none" opacity="0.8">
      <path d="M-120 10 H-60 V40 H0 V15 H80"/>
      <path d="M-110 60 H-40 V45 H40 V65 H120"/>
    </g>
    <circle cx="-90" cy="30" r="10" fill="#0f766e" stroke="#f0fdfa" stroke-width="2"/>
    <rect x="20" y="0" width="46" height="26" rx="3" fill="#0b3b37" stroke="#5eead4" stroke-width="2"/>
    <circle cx="90" cy="50" r="14" fill="#134e4a" stroke="#2dd4bf" stroke-width="2"/>
  </g>

  <!-- soldering iron resting on stand, left side -->
  <g transform="translate(160,905)">
    <ellipse cx="0" cy="14" rx="46" ry="10" fill="#0a2e2b"/>
    <rect x="-6" y="-30" width="12" height="44" rx="4" fill="#334155"/>
    <line x1="-4" y1="-30" x2="70" y2="-70" stroke="#e2e8f0" stroke-width="7" stroke-linecap="round"/>
    <line x1="66" y1="-72" x2="86" y2="-80" stroke="#f97316" stroke-width="6" stroke-linecap="round"/>
    <path d="M84 -82 l6 -4 l-2 8 z" fill="#fdba74"/>
  </g>

  <!-- Person 1: seated, soldering, smiling -->
  <g transform="translate(300,760)">
    <!-- chair/stool implied by pose only -->
    <!-- torso -->
    <path d="M-70 260 C-90 150 -60 30 0 20 C60 30 90 150 70 260 Z" fill="#0f766e"/>
    <!-- head -->
    <circle cx="0" cy="-40" r="48" fill="#e7b393"/>
    <!-- hair -->
    <path d="M-48 -55 C-52 -100 48 -100 48 -55 C48 -75 -48 -75 -48 -55 Z" fill="#3b2a20"/>
    <path d="M-48 -50 C-50 -20 -44 5 -30 20 C-46 5 -50 -25 -48 -50 Z" fill="#3b2a20"/>
    <!-- safety glasses -->
    <rect x="-34" y="-46" width="30" height="16" rx="7" fill="none" stroke="#0f172a" stroke-width="4"/>
    <rect x="4" y="-46" width="30" height="16" rx="7" fill="none" stroke="#0f172a" stroke-width="4"/>
    <line x1="-4" y1="-38" x2="4" y2="-38" stroke="#0f172a" stroke-width="4"/>
    <!-- smile -->
    <path d="M-16 -14 Q0 0 16 -14" stroke="#7a3b2e" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- arm to iron -->
    <path d="M40 60 C90 40 130 10 168 -20" stroke="#e7b393" stroke-width="22" stroke-linecap="round" fill="none"/>
    <path d="M40 55 C15 90 -10 110 -34 150" stroke="#0f766e" stroke-width="26" stroke-linecap="round" fill="none"/>
    <!-- hand holding iron near pcb -->
    <circle cx="172" cy="-24" r="14" fill="#e7b393"/>
  </g>

  <!-- Person 2: standing, holding a big resistor / part, waving happily -->
  <g transform="translate(650,700)">
    <path d="M-80 300 C-100 170 -70 40 0 30 C70 40 100 170 80 300 Z" fill="#134e4a"/>
    <circle cx="0" cy="-40" r="50" fill="#c88a5f"/>
    <path d="M-50 -60 C-54 -110 54 -110 50 -60 C40 -95 -40 -95 -50 -60 Z" fill="#1c1410"/>
    <path d="M46 -60 C58 -30 54 0 34 20 C50 -5 54 -35 46 -60 Z" fill="#1c1410"/>
    <path d="M-16 -14 Q0 2 16 -14" stroke="#5a2f22" stroke-width="4" fill="none" stroke-linecap="round"/>
    <circle cx="-16" cy="-44" r="4" fill="#1c1410"/>
    <circle cx="16" cy="-44" r="4" fill="#1c1410"/>
    <!-- raised waving arm -->
    <path d="M40 30 C80 -10 90 -60 78 -110" stroke="#c88a5f" stroke-width="22" stroke-linecap="round" fill="none"/>
    <circle cx="78" cy="-114" r="15" fill="#c88a5f"/>
    <!-- other arm holding big component -->
    <path d="M-40 60 C-80 90 -100 120 -110 160" stroke="#134e4a" stroke-width="24" stroke-linecap="round" fill="none"/>
    <g transform="translate(-122,172) rotate(20)">
      <rect x="-30" y="-11" width="60" height="22" rx="9" fill="#fde68a"/>
      <rect x="-16" y="-11" width="5" height="22" fill="#7c2d12"/>
      <rect x="-4" y="-11" width="5" height="22" fill="#000"/>
      <rect x="8" y="-11" width="5" height="22" fill="#f97316"/>
      <line x1="-30" y1="0" x2="-46" y2="0" stroke="#94a3b8" stroke-width="4"/>
      <line x1="30" y1="0" x2="46" y2="0" stroke="#94a3b8" stroke-width="4"/>
    </g>
  </g>

  <!-- little sparkle near iron tip -->
  <g transform="translate(470,760)" stroke="#fde68a" stroke-width="3" stroke-linecap="round">
    <line x1="0" y1="-10" x2="0" y2="10"/>
    <line x1="-10" y1="0" x2="10" y2="0"/>
    <line x1="-7" y1="-7" x2="7" y2="7"/>
    <line x1="-7" y1="7" x2="7" y2="-7"/>
  </g>

  <!-- soft vignette -->
  <rect width="900" height="1200" fill="url(#bg)" opacity="0"/>
</svg>
